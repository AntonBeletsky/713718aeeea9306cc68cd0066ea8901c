<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="Author" content="Anton Beletsky">
<title>Chess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

/* ─── RESET ──────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  min-height: 100%;
  font-family: var(--font-body);
  background: var(--page-bg);
  color: var(--page-text);
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
input { font: inherit; color: inherit; }
img { max-width: 100%; display: block; }
ul { margin: 0; padding: 0; list-style: none; }
a { color: inherit; }

/* ─── DESIGN TOKENS ──────────────────────────────────────────────────── */

:root {
  --page-bg: #032D44;
  --page-bg-raised: #0a3d58;
  --page-text: #F1EBE6;
  --page-text-dim: #b9c7ce;
  --gold: #D9B98A;
  --gold-strong: #E7D3B3;
  --wood-dark: #441A03;
  --wood-mid: #5c4a35;
  --wood-mid-alt: #4a3b29;
  --square-light: #b5915f;
  --square-dark: #441a03;
  --board-frame-outer: #1a120c;
  --board-frame-inner: #c9a37c;
  --danger: #E7594A;
  --focus-ring: #7FC7FF;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', Consolas, monospace;

  --radius-sm: 4px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;

  --shadow-card: 0 10px 30px rgba(0,0,0,0.35);
}

/* ─── ACCESSIBILITY ──────────────────────────────────────────────────── */

:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 2px;
}

.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* ─── HEADER NAV WIDGET ──────────────────────────────────────────────── */

.header-nav-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-3) var(--space-5);
  background: #1c1c1c;
  border-bottom: 1px solid rgba(217,185,138,0.25);
  position: relative;
}

.header-nav-brand {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--gold-strong);
  letter-spacing: 0.02em;
}

.header-nav-links {
  display: flex;
  gap: var(--space-2);
}

.header-nav-link {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 15px;
  color: #e7d3b3;
  text-decoration: none;
}

.header-nav-link:hover,
.header-nav-link[data-state="active"] {
  background: rgba(217,185,138,0.14);
}

.header-nav-menu-toggle {
  display: none;
  padding: var(--space-2);
  color: var(--gold-strong);
  font-size: 22px;
  line-height: 1;
}

@media (max-width: 767px) {
  .header-nav-links {
    position: absolute;
    top: 100%; left: 0; right: 0;
    flex-direction: column;
    background: #1c1c1c;
    padding: var(--space-2);
    border-bottom: 1px solid rgba(217,185,138,0.25);
  }
  .header-nav-container[data-state="collapsed"] .header-nav-links { display: none; }
  .header-nav-menu-toggle { display: block; }
}

/* ─── PLAYER CARD WIDGET ─────────────────────────────────────────────── */

.player-card-container {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--page-bg-raised);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  min-width: 260px;
}

.player-card-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--page-bg);
  background: var(--gold);
  flex-shrink: 0;
}

.player-card-body { min-width: 0; flex: 1; }

.player-card-name {
  font-weight: 600;
  font-size: 16px;
  color: var(--page-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-card-meta {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 13px;
  color: var(--page-text-dim);
}

.player-card-flag {
  width: 20px; height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
  object-fit: cover;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
}

.player-card-container[data-state="active-turn"] {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

/* ─── CLOCK WIDGET ───────────────────────────────────────────────────── */

.clock-container {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-sm);
  background: #2a2018;
  color: #f4ecd8;
  text-align: center;
  min-width: 120px;
}

.clock-container[data-state="active"] {
  background: var(--gold);
  color: var(--wood-dark);
}

.clock-container[data-state="low-time"] {
  color: var(--danger);
}

.clock-container[data-state="expired"] {
  color: var(--danger);
  text-decoration: line-through;
}

/* ─── BOARD WIDGET ───────────────────────────────────────────────────── */

.board-container {
  display: grid;
  grid-template-columns: 24px 1fr;
  grid-template-rows: 1fr 24px;
  gap: 4px;
  width: min(90vw, 560px);
  aspect-ratio: 1 / 1;
}

.board-ranks {
  grid-column: 1; grid-row: 1;
  display: grid;
  grid-template-rows: repeat(8, 1fr);
}

.board-files {
  grid-column: 2; grid-row: 2;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
}

.board-ranks span, .board-files span {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--gold);
  font-weight: 600;
}

.board-grid {
  grid-column: 2; grid-row: 1;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  border-radius: var(--radius-lg);
  overflow: hidden;
  padding: 12px;
  background: var(--board-frame-outer);
  box-shadow: inset 0 0 0 6px var(--board-frame-inner), var(--shadow-card);
  position: relative;
}

.board-square {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.board-square[data-state~="light"] { background: var(--square-light); }
.board-square[data-state~="dark"] { background: var(--square-dark); }

.board-square[data-state~="selected"]::after {
  content: "";
  position: absolute; inset: 0;
  box-shadow: inset 0 0 0 3px var(--gold-strong);
}

.board-square[data-state~="legal-target"]::after {
  content: "";
  position: absolute;
  width: 28%; height: 28%;
  border-radius: 50%;
  background: rgba(217,185,138,0.55);
}

.board-square[data-state~="drag-over"] {
  background: rgba(217,185,138,0.45);
}

.board-piece {
  width: min(7.5vw, 42px);
  height: min(7.5vw, 42px);
  cursor: grab;
  touch-action: none;
  transition: transform 120ms ease;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.45));
  user-select: none;
  -webkit-user-drag: none;
}

.board-piece[data-state~="dragging"] {
  opacity: 0.35;
}

.board-drag-ghost {
  position: fixed;
  top: 0; left: 0;
  width: min(7.5vw, 42px);
  height: min(7.5vw, 42px);
  pointer-events: none;
  z-index: 50;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* ─── MOVE INPUT WIDGET ──────────────────────────────────────────────── */

.move-input-container {
  display: flex;
  gap: var(--space-2);
  margin-top: var(--space-3);
}

.move-input-field {
  flex: 1;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(217,185,138,0.4);
  background: var(--page-bg-raised);
  color: var(--page-text);
  font-family: var(--font-mono);
}

.move-input-field[data-state="invalid"] {
  border-color: var(--danger);
  animation: move-input-shake 220ms ease;
}

@keyframes move-input-shake {
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.move-input-submit {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-sm);
  background: var(--gold);
  color: var(--wood-dark);
  font-weight: 700;
}

.move-input-submit:hover { background: var(--gold-strong); }

.move-input-hint {
  font-size: 12px;
  color: var(--page-text-dim);
  margin-top: var(--space-1);
}

/* ─── MOVES HISTORY WIDGET ───────────────────────────────────────────── */

.moves-container {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 320px;
  background: var(--page-bg-raised);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.moves-header {
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  color: var(--gold-strong);
  border-bottom: 1px solid rgba(217,185,138,0.2);
}

.moves-list {
  max-height: 320px;
  overflow-y: auto;
}

.moves-list table { width: 100%; border-collapse: collapse; }

.moves-list tr { background: var(--wood-mid); color: var(--page-text); }
.moves-list tr:nth-child(even) { background: var(--wood-mid-alt); }

.moves-list td {
  padding: var(--space-2) var(--space-3);
  font-family: var(--font-mono);
  font-size: 14px;
}

.moves-list td:first-child { width: 32px; color: var(--page-text-dim); }

.moves-empty {
  padding: var(--space-4);
  text-align: center;
  color: var(--page-text-dim);
  font-size: 14px;
}

.moves-pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-top: 1px solid rgba(217,185,138,0.2);
}

.moves-pagination button {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  background: rgba(217,185,138,0.14);
  color: var(--gold-strong);
  font-size: 13px;
  font-weight: 600;
}

.moves-pagination button:disabled { opacity: 0.35; cursor: not-allowed; }

.moves-pagination-page { font-size: 13px; color: var(--page-text-dim); }

/* ─── SETTINGS MODAL WIDGET ──────────────────────────────────────────── */

.settings-modal-container {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(3,45,68,0.72);
  z-index: 100;
  padding: var(--space-4);
}

.settings-modal-container[hidden] { display: none; }

.settings-modal-dialog {
  width: min(92vw, 420px);
  background: var(--page-bg-raised);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: var(--space-5);
}

.settings-modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--gold-strong);
  margin: 0 0 var(--space-4);
}

.settings-modal-field { margin-bottom: var(--space-4); }

.settings-modal-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--page-text-dim);
  margin-bottom: var(--space-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.settings-modal-radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.settings-modal-radio-option {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  border-radius: 999px;
  border: 1px solid rgba(217,185,138,0.4);
  cursor: pointer;
  font-size: 14px;
}

.settings-modal-radio-option:has(input:checked) {
  background: var(--gold);
  color: var(--wood-dark);
  border-color: var(--gold);
}

.settings-modal-radio-option input { accent-color: var(--gold); }

.settings-modal-range { width: 100%; accent-color: var(--gold); }

.settings-modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--space-2);
  margin-top: var(--space-5);
}

.settings-modal-actions button {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-sm);
  font-weight: 600;
}

.settings-modal-cancel { background: rgba(255,255,255,0.08); color: var(--page-text); }
.settings-modal-confirm { background: var(--gold); color: var(--wood-dark); }

/* ─── PAGE ORCHESTRATOR LAYOUT ───────────────────────────────────────── */

.chess-page { min-height: 100vh; display: flex; flex-direction: column; }

.chess-page-board-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: var(--space-6);
  padding: var(--space-5);
  flex-wrap: wrap;
}

.chess-page-side {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  width: 260px;
}

.chess-page-match {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-3);
}

.chess-page-player-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  width: 100%;
  max-width: 560px;
}

.chess-page-player-row[data-side="top"] { flex-direction: row; }
.chess-page-player-row[data-side="bottom"] { flex-direction: row-reverse; }

.chess-page-player-row .player-card-container { flex: 1; }

/* ─── RESPONSIVE ─────────────────────────────────────────────────────── */

@media (max-width: 1199px) {
  .chess-page-board-row { justify-content: center; }
}

@media (max-width: 767px) {
  .chess-page-board-row { padding: var(--space-3); gap: var(--space-4); }
  .chess-page-side { width: 100%; max-width: 560px; }
  .header-nav-brand { font-size: 17px; }
}

</style>
</head>
<body>

<div class="chess-page" aria-label="Шахматная партия">

  <!-- Переиспользуется на других страницах сайта; см. HeaderNavController -->
  <header class="header-nav-container" data-ref="header-nav-container" data-state="collapsed">
    <span class="header-nav-brand">Chess</span>
    <button type="button" class="header-nav-menu-toggle" data-action="toggle-menu" aria-expanded="false" aria-controls="header-nav-links">
      ☰
      <span class="visually-hidden">Меню</span>
    </button>
    <nav class="header-nav-links" id="header-nav-links" data-ref="header-nav-links" aria-label="Основная навигация">
      <a class="header-nav-link" href="gamelist.html" data-ref="header-nav-link">Список партий</a>
      <a class="header-nav-link" href="playerlist.html" data-ref="header-nav-link">Игроки</a>
      <a class="header-nav-link" href="creategame.html" data-ref="header-nav-link">Новая партия</a>
      <a class="header-nav-link" href="profile.html" data-ref="header-nav-link">Профиль</a>
    </nav>
  </header>

  <div class="chess-page-board-row">

    <aside class="chess-page-side" aria-label="Настройки партии">
      <button type="button" class="move-input-submit" data-ref="new-game-trigger" data-action="open-settings">Новая партия</button>
    </aside>

    <div class="chess-page-match">

      <div class="chess-page-player-row" data-side="top">
        <div class="player-card-container" data-ref="player-card-container" data-color="black"
             data-player-name="John Doe" data-player-rating="1840" data-player-flag-label="Украина" data-player-flag-src="ua.svg">
          <div class="player-card-avatar" data-ref="player-card-avatar" aria-hidden="true"></div>
          <div class="player-card-body">
            <div class="player-card-name" data-ref="player-card-name"></div>
            <div class="player-card-meta">
              <img class="player-card-flag" data-ref="player-card-flag">
              <span data-ref="player-card-rating"></span>
            </div>
          </div>
        </div>
        <div class="clock-container" data-ref="clock-container" data-color="black" data-clock-minutes="10" role="timer" aria-label="Время чёрных">10:00</div>
      </div>

      <section class="board-container" data-ref="board-container" aria-label="Шахматная доска">
        <div class="board-ranks" data-ref="board-ranks" aria-hidden="true"></div>
        <div class="board-files" data-ref="board-files" aria-hidden="true"></div>
        <div class="board-grid" data-ref="board-grid" role="grid" aria-label="Позиция на доске"></div>
        <img class="board-drag-ghost" data-ref="board-drag-ghost" hidden aria-hidden="true" alt="">
      </section>

      <div class="chess-page-player-row" data-side="bottom">
        <div class="player-card-container" data-ref="player-card-container" data-color="white"
             data-player-name="Jane Flex" data-player-rating="2010" data-player-flag-label="Евросоюз" data-player-flag-src="eu.svg">
          <div class="player-card-avatar" data-ref="player-card-avatar" aria-hidden="true"></div>
          <div class="player-card-body">
            <div class="player-card-name" data-ref="player-card-name"></div>
            <div class="player-card-meta">
              <img class="player-card-flag" data-ref="player-card-flag">
              <span data-ref="player-card-rating"></span>
            </div>
          </div>
        </div>
        <div class="clock-container" data-ref="clock-container" data-color="white" data-clock-minutes="10" data-state="active" role="timer" aria-label="Время белых">10:00</div>
      </div>

      <form class="move-input-container" data-ref="move-input-container" aria-label="Ввести ход">
        <label class="visually-hidden" for="move-input-field">Ход в формате e2-e4</label>
        <input class="move-input-field" id="move-input-field" data-ref="move-input-field" type="text" placeholder="e2-e4" autocomplete="off">
        <button class="move-input-submit" data-ref="move-input-submit" type="submit">Ходить</button>
      </form>
      <p class="move-input-hint">Формат: клетка-клетка, например e2-e4</p>

    </div>

    <div class="chess-page-side">
      <div class="moves-container" data-ref="moves-container" aria-label="История ходов">
        <div class="moves-header">Записи партии</div>
        <div class="moves-list" data-ref="moves-list" role="log" aria-live="polite" aria-relevant="additions"></div>
        <div class="moves-pagination" data-ref="moves-pagination">
          <button type="button" data-action="prev-page" data-ref="moves-prev">Назад</button>
          <span class="moves-pagination-page" data-ref="moves-page-label">Стр. 1</span>
          <button type="button" data-action="next-page" data-ref="moves-next">Далее</button>
        </div>
      </div>
    </div>

  </div>

  <div class="settings-modal-container" data-ref="settings-modal-container" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title" hidden>
    <div class="settings-modal-dialog" data-ref="settings-modal-dialog">
      <h2 class="settings-modal-title" id="settings-modal-title">Новая партия</h2>

      <div class="settings-modal-field">
        <span class="settings-modal-label" id="settings-color-label">Цвет</span>
        <div class="settings-modal-radio-group" role="radiogroup" aria-labelledby="settings-color-label">
          <label class="settings-modal-radio-option">
            <input type="radio" name="settings-color" value="white" data-ref="settings-color-option" checked> Белые
          </label>
          <label class="settings-modal-radio-option">
            <input type="radio" name="settings-color" value="black" data-ref="settings-color-option"> Чёрные
          </label>
          <label class="settings-modal-radio-option">
            <input type="radio" name="settings-color" value="random" data-ref="settings-color-option"> Случайно
          </label>
        </div>
      </div>

      <div class="settings-modal-field">
        <label class="settings-modal-label" for="settings-time-control">Время на партию: <span data-ref="settings-time-value">10</span> мин</label>
        <input class="settings-modal-range" id="settings-time-control" data-ref="settings-time-control" type="range" min="1" max="60" value="10">
      </div>

      <div class="settings-modal-actions">
        <button type="button" class="settings-modal-cancel" data-ref="settings-cancel">Отмена</button>
        <button type="button" class="settings-modal-confirm" data-ref="settings-confirm">Начать партию</button>
      </div>
    </div>
  </div>

</div>

<script>

class HeaderNavController {
  static DEFAULTS = {};

  constructor(root) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._toggleEl = this._root.querySelector('[data-action="toggle-menu"]');
    this._bind();
  }

  _bind() {
    const sig = { signal: this._ac.signal };
    if (!this._toggleEl) return;
    this._toggleEl.addEventListener('click', () => this._onToggle(), sig);
  }

  _onToggle() {
    const wasCollapsed = this._root.getAttribute('data-state') === 'collapsed';
    this._root.setAttribute('data-state', wasCollapsed ? 'expanded' : 'collapsed');
    this._toggleEl.setAttribute('aria-expanded', String(wasCollapsed));
  }

  destroy() {
    this._ac.abort();
  }
}

class PlayerCardController {
  static DEFAULTS = { name: 'Player', rating: '—', flagLabel: '', flagSrc: '' };

  constructor(root, opts = {}) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._config = this._buildConfig(opts);
    this._cacheDom();
    this._render();
  }

  _buildConfig(opts) {
    const d = this._root.dataset;
    const fromData = {};
    if (d.playerName) fromData.name = d.playerName;
    if (d.playerRating) fromData.rating = d.playerRating;
    if (d.playerFlagLabel) fromData.flagLabel = d.playerFlagLabel;
    if (d.playerFlagSrc) fromData.flagSrc = d.playerFlagSrc;
    return { ...PlayerCardController.DEFAULTS, ...opts, ...fromData };
  }

  _cacheDom() {
    this._nameEl = this._root.querySelector('[data-ref="player-card-name"]');
    this._ratingEl = this._root.querySelector('[data-ref="player-card-rating"]');
    this._avatarEl = this._root.querySelector('[data-ref="player-card-avatar"]');
    this._flagEl = this._root.querySelector('[data-ref="player-card-flag"]');
  }

  _initials(name) {
    return name.trim().split(/\s+/).map((word) => word[0]).slice(0, 2).join('').toUpperCase();
  }

  _render() {
    if (this._nameEl) this._nameEl.textContent = this._config.name;
    if (this._ratingEl) this._ratingEl.textContent = this._config.rating;
    if (this._avatarEl) this._avatarEl.textContent = this._initials(this._config.name);
    if (this._flagEl && this._config.flagSrc) {
      this._flagEl.setAttribute('src', this._config.flagSrc);
      this._flagEl.setAttribute('alt', this._config.flagLabel ? `Флаг: ${this._config.flagLabel}` : '');
    }
  }

  get color() {

  }

  setActiveTurn(isActive) {

    else this._root.removeAttribute('data-state');
  }

  destroy() {
    this._ac.abort();
  }
}

class ClockController {
  static DEFAULTS = { minutes: 10 };

  constructor(root, opts = {}) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._config = this._buildConfig(opts);
    this._state = { remainingMs: this._config.minutes * 60 * 1000, running: false };
    this._intervalId = null;
    this._render();
  }

  _buildConfig(opts) {
    const d = this._root.dataset;
    const cfg = { ...ClockController.DEFAULTS, ...opts };
    if (d.clockMinutes) cfg.minutes = Number(d.clockMinutes);
    return cfg;
  }

  get color() {
    return this._root.dataset.color;
  }

  reset(minutes = this._config.minutes) {
    this.stop();
    this._state.remainingMs = minutes * 60 * 1000;
    this._render();
  }

  start() {
    if (this._state.running || this._state.remainingMs <= 0) return;
    this._state.running = true;
    let last = performance.now();
    this._intervalId = setInterval(() => {
      const now = performance.now();
      this._state.remainingMs = Math.max(0, this._state.remainingMs - (now - last));
      last = now;
      this._render();
      if (this._state.remainingMs <= 0) {
        this.stop();
        document.dispatchEvent(new CustomEvent('clock:expired', { detail: { color: this.color } }));
      }
    }, 250);
    this._render();
  }

  stop() {
    this._state.running = false;
    if (this._intervalId) clearInterval(this._intervalId);
    this._intervalId = null;
    this._render();
  }

  _render() {
    const totalSeconds = Math.ceil(this._state.remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    this._root.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

    if (this._state.remainingMs <= 0) this._root.setAttribute('data-state', 'expired');
    else if (this._state.running && this._state.remainingMs <= 30000) this._root.setAttribute('data-state', 'low-time');
    else if (this._state.running) this._root.setAttribute('data-state', 'active');
    else this._root.removeAttribute('data-state');
  }

  destroy() {
    this.stop();
    this._ac.abort();
  }
}

class BoardController {
  static DEFAULTS = {};

  static PIECE_NAMES = {
    k: 'король', q: 'ферзь', r: 'ладья', b: 'слон', n: 'конь', p: 'пешка',
  };

  static PIECE_FILES = {
    w: { k: 'White_King.svg', q: 'White_Queen.svg', r: 'White_Rook.svg', b: 'White_Bishop.svg', n: 'White_Knight.svg', p: 'White_Pawn.svg' },
    b: { k: 'Black_King.svg', q: 'Black_Queen.svg', r: 'Black_Rook.svg', b: 'Black_Bishop.svg', n: 'Black_Knight.svg', p: 'Black_Pawn.svg' },
  };

  static FILES = 'abcdefgh';

  constructor(root, opts = {}) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._config = { ...BoardController.DEFAULTS, ...opts };
    this._state = {
      position: this._createStartPosition(),
      turn: 'w',
      selectedSquare: null,
      focusedSquare: 'e2',
    };
    this._dragFrom = null;
    this._suppressNextClick = false;
    this._cacheDom();
    this._bind();
    this._render();
  }

  _cacheDom() {
    this._gridEl = this._root.querySelector('[data-ref="board-grid"]');
    this._ranksEl = this._root.querySelector('[data-ref="board-ranks"]');
    this._filesEl = this._root.querySelector('[data-ref="board-files"]');
    this._ghostEl = this._root.querySelector('[data-ref="board-drag-ghost"]');
    this._renderCoordinates();
  }

  _renderCoordinates() {
    const ranks = document.createDocumentFragment();
    for (let rank = 8; rank >= 1; rank--) {
      const span = document.createElement('span');
      span.textContent = String(rank);
      ranks.appendChild(span);
    }
    this._ranksEl.replaceChildren(ranks);

    const files = document.createDocumentFragment();
    for (const file of BoardController.FILES) {
      const span = document.createElement('span');
      span.textContent = file;
      files.appendChild(span);
    }
    this._filesEl.replaceChildren(files);
  }

  _createStartPosition() {
    const backRank = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
    const row = (types, color) => types.map((type) => (type ? { type, color } : null));
    return [
      row(backRank, 'b'),
      row(Array(8).fill('p'), 'b'),
      row(Array(8).fill(null), null),
      row(Array(8).fill(null), null),
      row(Array(8).fill(null), null),
      row(Array(8).fill(null), null),
      row(Array(8).fill('p'), 'w'),
      row(backRank, 'w'),
    ];
  }

  _squareName(row, col) {
    return `${BoardController.FILES[col]}${8 - row}`;
  }

  _squareFromName(name) {
    return { col: BoardController.FILES.indexOf(name[0]), row: 8 - Number(name[1]) };
  }

  _isPathClear(fromRow, fromCol, toRow, toCol) {
    const stepRow = Math.sign(toRow - fromRow);
    const stepCol = Math.sign(toCol - fromCol);
    let row = fromRow + stepRow;
    let col = fromCol + stepCol;
    while (row !== toRow || col !== toCol) {
      if (this._state.position[row][col]) return false;
      row += stepRow;
      col += stepCol;
    }
    return true;
  }

  _isPseudoLegal(fromRow, fromCol, toRow, toCol) {
    const piece = this._state.position[fromRow][fromCol];
    if (!piece) return false;
    const target = this._state.position[toRow][toCol];
    if (target && target.color === piece.color) return false;

    const dRow = toRow - fromRow;
    const dCol = toCol - fromCol;
    const absRow = Math.abs(dRow);
    const absCol = Math.abs(dCol);
    if (absRow === 0 && absCol === 0) return false;

    switch (piece.type) {
      case 'p': {
        const dir = piece.color === 'w' ? -1 : 1;
        const startRow = piece.color === 'w' ? 6 : 1;
        if (dCol === 0 && !target) {
          if (dRow === dir) return true;
          return fromRow === startRow && dRow === 2 * dir && !this._state.position[fromRow + dir][fromCol];
        }
        return absCol === 1 && dRow === dir && !!target && target.color !== piece.color;
      }
      case 'n':
        return (absRow === 2 && absCol === 1) || (absRow === 1 && absCol === 2);
      case 'b':
        return absRow === absCol && this._isPathClear(fromRow, fromCol, toRow, toCol);
      case 'r':
        return (dRow === 0 || dCol === 0) && this._isPathClear(fromRow, fromCol, toRow, toCol);
      case 'q':
        return (dRow === 0 || dCol === 0 || absRow === absCol) && this._isPathClear(fromRow, fromCol, toRow, toCol);
      case 'k':
        return absRow <= 1 && absCol <= 1;
      default:
        return false;
    }
  }

  _legalTargetsFrom(row, col) {
    const targets = [];
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (this._isPseudoLegal(row, col, r, c)) targets.push(this._squareName(r, c));
      }
    }
    return targets;
  }

  applyMove(notation) {
    const match = /^\s*([a-h][1-8])\s*[-\s]\s*([a-h][1-8])\s*$/i.exec(String(notation));
    if (!match) {
      this._emitIllegal(null, null, 'format');
      return false;
    }
    const from = this._squareFromName(match[1].toLowerCase());
    const to = this._squareFromName(match[2].toLowerCase());
    return this._tryMove(from.row, from.col, to.row, to.col);
  }

  _tryMove(fromRow, fromCol, toRow, toCol) {
    const fromName = this._squareName(fromRow, fromCol);
    const toName = this._squareName(toRow, toCol);
    const piece = this._state.position[fromRow][fromCol];

    if (!piece) { this._emitIllegal(fromName, toName, 'empty-square'); return false; }
    if (piece.color !== this._state.turn) { this._emitIllegal(fromName, toName, 'wrong-turn'); return false; }
    if (!this._isPseudoLegal(fromRow, fromCol, toRow, toCol)) { this._emitIllegal(fromName, toName, 'illegal-pattern'); return false; }

    const capturedPiece = this._state.position[toRow][toCol];
    this._state.position[toRow][toCol] = piece;
    this._state.position[fromRow][fromCol] = null;
    if (piece.type === 'p' && (toRow === 0 || toRow === 7)) piece.type = 'q';

    this._state.turn = this._state.turn === 'w' ? 'b' : 'w';
    this._state.selectedSquare = null;
    this._state.focusedSquare = toName;
    this._render();

    document.dispatchEvent(new CustomEvent('board:move-made', {
      detail: {
        from: fromName,
        to: toName,
        piece: piece.type,
        color: piece.color,
        notation: `${fromName}-${toName}`,
        capturedPiece: capturedPiece ? capturedPiece.type : null,
      },
    }));
    return true;
  }

  _emitIllegal(from, to, reason) {
    document.dispatchEvent(new CustomEvent('board:illegal-move', { detail: { from, to, reason } }));
  }

  reset() {
    this._state.position = this._createStartPosition();
    this._state.turn = 'w';
    this._state.selectedSquare = null;
    this._state.focusedSquare = 'e2';
    this._render();
  }

  _pieceLabel(piece, squareName) {
    const color = piece.color === 'w' ? 'белая' : 'чёрная';
    return `${squareName}, ${color} ${BoardController.PIECE_NAMES[piece.type]}`;
  }

  _handleSquareActivate(squareName) {
    const { row, col } = this._squareFromName(squareName);
    const piece = this._state.position[row][col];

    if (this._state.selectedSquare) {
      const from = this._squareFromName(this._state.selectedSquare);
      if (this._state.selectedSquare === squareName) {
        this._state.selectedSquare = null;
        this._render();
        return;
      }
      const moved = this._tryMove(from.row, from.col, row, col);
      if (moved) return;
      if (piece && piece.color === this._state.turn) {
        this._state.selectedSquare = squareName;
        this._render();
      } else {
        this._state.selectedSquare = null;
        this._render();
      }
      return;
    }

    if (piece && piece.color === this._state.turn) {
      this._state.selectedSquare = squareName;
      this._render();
    }
  }

  _bind() {
    const sig = { signal: this._ac.signal };
    this._gridEl.addEventListener('click', (event) => this._onClick(event), sig);
    this._gridEl.addEventListener('keydown', (event) => this._onKeydown(event), sig);
    this._gridEl.addEventListener('pointerdown', (event) => this._onPointerDown(event), sig);
  }

  _onClick(event) {
    if (this._suppressNextClick) {
      this._suppressNextClick = false;
      return;
    }
    const squareEl = event.target.closest('[data-ref="board-square"]');
    if (!squareEl) return;
    this._state.focusedSquare = squareEl.dataset.id;
    this._handleSquareActivate(squareEl.dataset.id);
  }

  _onKeydown(event) {
    const squareEl = event.target.closest('[data-ref="board-square"]');
    if (!squareEl) return;
    const { row, col } = this._squareFromName(squareEl.dataset.id);

    const deltas = { ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1] };
    if (deltas[event.key]) {
      event.preventDefault();
      const [dRow, dCol] = deltas[event.key];
      const nextRow = Math.min(7, Math.max(0, row + dRow));
      const nextCol = Math.min(7, Math.max(0, col + dCol));
      this._state.focusedSquare = this._squareName(nextRow, nextCol);
      this._render();
      this._gridEl.querySelector(`[data-ref="board-square"][data-id="${this._state.focusedSquare}"]`)?.focus();
      return;
    }
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      this._handleSquareActivate(squareEl.dataset.id);
      return;
    }
    if (event.key === 'Escape' && this._state.selectedSquare) {
      this._state.selectedSquare = null;
      this._render();
    }
  }

  _onPointerDown(event) {
    const pieceEl = event.target.closest('[data-ref="board-piece"]');
    if (!pieceEl) return;
    const squareEl = pieceEl.closest('[data-ref="board-square"]');
    const { row, col } = this._squareFromName(squareEl.dataset.id);
    const piece = this._state.position[row][col];
    if (!piece || piece.color !== this._state.turn) return;

    this._dragFrom = { row, col };
    pieceEl.dataset.state = `${pieceEl.dataset.state} dragging`;
    pieceEl.setPointerCapture(event.pointerId);

    this._ghostEl.src = BoardController.PIECE_FILES[piece.color][piece.type];
    this._ghostEl.dataset.state = piece.color === 'w' ? 'white' : 'black';
    this._ghostEl.style.left = `${event.clientX}px`;
    this._ghostEl.style.top = `${event.clientY}px`;
    this._ghostEl.hidden = false;

    const sig = { signal: this._ac.signal };
    const onMove = (moveEvent) => {
      this._ghostEl.style.left = `${moveEvent.clientX}px`;
      this._ghostEl.style.top = `${moveEvent.clientY}px`;
      this._clearDragOverState();
      const under = document.elementFromPoint(moveEvent.clientX, moveEvent.clientY);
      const overSquare = under && under.closest('[data-ref="board-square"]');
      if (overSquare) overSquare.dataset.state = `${overSquare.dataset.state} drag-over`;
    };

    const cleanup = () => {
      if (pieceEl.hasPointerCapture(event.pointerId)) pieceEl.releasePointerCapture(event.pointerId);
      this._ghostEl.hidden = true;
      this._clearDragOverState();
      pieceEl.dataset.state = pieceEl.dataset.state.replace(/\bdragging\b/, '').trim();
      this._gridEl.removeEventListener('pointermove', onMove);
      this._gridEl.removeEventListener('pointerup', onUp);
      this._gridEl.removeEventListener('pointercancel', onCancel);
      this._suppressNextClick = true;
    };

    const onUp = (upEvent) => {
      const under = document.elementFromPoint(upEvent.clientX, upEvent.clientY);
      const overSquare = under && under.closest('[data-ref="board-square"]');
      const from = this._dragFrom;
      this._dragFrom = null;
      cleanup();
      if (overSquare && from) {
        const to = this._squareFromName(overSquare.dataset.id);
        this._tryMove(from.row, from.col, to.row, to.col);
      } else {
        this._render();
      }
    };

    const onCancel = () => {
      this._dragFrom = null;
      cleanup();
      this._render();
    };

    this._gridEl.addEventListener('pointermove', onMove, sig);
    this._gridEl.addEventListener('pointerup', onUp, sig);
    this._gridEl.addEventListener('pointercancel', onCancel, sig);
  }

  _clearDragOverState() {
    this._gridEl.querySelectorAll('[data-state~="drag-over"]').forEach((el) => {
      el.dataset.state = el.dataset.state.replace(/\bdrag-over\b/, '').trim();
    });
  }

  _render() {
    const legalTargets = new Set();
    if (this._state.selectedSquare) {
      const selected = this._squareFromName(this._state.selectedSquare);
      this._legalTargetsFrom(selected.row, selected.col).forEach((square) => legalTargets.add(square));
    }

    const fragment = document.createDocumentFragment();
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        const squareName = this._squareName(row, col);
        const square = document.createElement('div');
        square.className = 'board-square';
        square.dataset.ref = 'board-square';
        square.dataset.id = squareName;
        square.setAttribute('role', 'gridcell');
        square.tabIndex = squareName === this._state.focusedSquare ? 0 : -1;

        const tokens = [(row + col) % 2 === 0 ? 'light' : 'dark'];
        if (this._state.selectedSquare === squareName) tokens.push('selected');
        if (legalTargets.has(squareName)) tokens.push('legal-target');
        square.dataset.state = tokens.join(' ');

        const piece = this._state.position[row][col];
        square.setAttribute('aria-label', piece ? this._pieceLabel(piece, squareName) : squareName);

        if (piece) {
          square.appendChild(this._createPieceElement(piece));
        }
        fragment.appendChild(square);
      }
    }
    this._gridEl.replaceChildren(fragment);
  }

  _createPieceElement(piece) {
    const pieceEl = document.createElement('img');
    pieceEl.className = 'board-piece';
    pieceEl.dataset.ref = 'board-piece';
    pieceEl.dataset.state = piece.color === 'w' ? 'white' : 'black';
    pieceEl.draggable = false;
    pieceEl.alt = '';
    pieceEl.setAttribute('aria-hidden', 'true');
    pieceEl.src = BoardController.PIECE_FILES[piece.color][piece.type];
    return pieceEl;
  }

  destroy() {
    this._ac.abort();
  }
}

class MoveInputController {
  static DEFAULTS = {};

  constructor(root) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._fieldEl = this._root.querySelector('[data-ref="move-input-field"]');
    this._bind();
  }

  _bind() {
    const sig = { signal: this._ac.signal };
    this._root.addEventListener('submit', (event) => this._onSubmit(event), sig);
    document.addEventListener('board:illegal-move', () => this._flagInvalid(), sig);
    document.addEventListener('board:move-made', () => this._clear(), sig);
  }

  _onSubmit(event) {
    event.preventDefault();
    const value = this._fieldEl.value.trim();
    if (!value) return;
    document.dispatchEvent(new CustomEvent('moveinput:submitted', { detail: { notation: value } }));
  }

  _flagInvalid() {
    this._fieldEl.dataset.state = 'invalid';
    setTimeout(() => this._fieldEl.removeAttribute('data-state'), 250);
  }

  _clear() {
    this._fieldEl.value = '';
    this._fieldEl.removeAttribute('data-state');
  }

  destroy() {
    this._ac.abort();
  }
}

class MovesController {
  static DEFAULTS = { pageSize: 8 };

  constructor(root, opts = {}) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._config = { ...MovesController.DEFAULTS, ...opts };
    this._state = { moves: [], page: 1 };
    this._cacheDom();
    this._bind();
    this._render();
  }

  _cacheDom() {
    this._listEl = this._root.querySelector('[data-ref="moves-list"]');
    this._pageLabelEl = this._root.querySelector('[data-ref="moves-page-label"]');
    this._prevBtn = this._root.querySelector('[data-ref="moves-prev"]');
    this._nextBtn = this._root.querySelector('[data-ref="moves-next"]');
  }

  _bind() {
    const sig = { signal: this._ac.signal };
    document.addEventListener('board:move-made', (event) => this._onMoveMade(event), sig);
    this._prevBtn.addEventListener('click', () => this._changePage(-1), sig);
    this._nextBtn.addEventListener('click', () => this._changePage(1), sig);
  }

  _onMoveMade(event) {
    this._state.moves.push(event.detail);
    this._state.page = this._totalPages();
    this._render();
  }

  reset() {
    this._state.moves = [];
    this._state.page = 1;
    this._render();
  }

  _totalPages() {
    const pairCount = Math.ceil(this._state.moves.length / 2);
    return Math.max(1, Math.ceil(pairCount / this._config.pageSize));
  }

  _changePage(delta) {
    const next = this._state.page + delta;
    if (next < 1 || next > this._totalPages()) return;
    this._state.page = next;
    this._render();
  }

  _pairMoves() {
    const pairs = [];
    for (let i = 0; i < this._state.moves.length; i += 2) {
      pairs.push({ number: i / 2 + 1, white: this._state.moves[i], black: this._state.moves[i + 1] });
    }
    return pairs;
  }

  _cell(text) {
    const td = document.createElement('td');
    td.textContent = text;
    return td;
  }

  _render() {
    const pairs = this._pairMoves();
    const totalPages = this._totalPages();
    const start = (this._state.page - 1) * this._config.pageSize;
    const pagePairs = pairs.slice(start, start + this._config.pageSize);

    if (pagePairs.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'moves-empty';
      empty.textContent = 'Ходов пока нет';
      this._listEl.replaceChildren(empty);
    } else {
      const table = document.createElement('table');
      const tbody = document.createElement('tbody');
      pagePairs.forEach((pair) => {
        const row = document.createElement('tr');
        row.appendChild(this._cell(String(pair.number)));
        row.appendChild(this._cell(pair.white ? pair.white.notation : ''));
        row.appendChild(this._cell(pair.black ? pair.black.notation : ''));
        tbody.appendChild(row);
      });
      table.appendChild(tbody);
      this._listEl.replaceChildren(table);
    }

    this._pageLabelEl.textContent = `Стр. ${this._state.page} из ${totalPages}`;
    this._prevBtn.disabled = this._state.page <= 1;
    this._nextBtn.disabled = this._state.page >= totalPages;
  }

  destroy() {
    this._ac.abort();
  }
}

class SettingsModalController {
  static DEFAULTS = {};

  constructor(root) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();
    this._lastFocused = null;
    this._cacheDom();
    this._bind();
  }

  _cacheDom() {
    this._dialogEl = this._root.querySelector('[data-ref="settings-modal-dialog"]');
    this._cancelBtn = this._root.querySelector('[data-ref="settings-cancel"]');
    this._confirmBtn = this._root.querySelector('[data-ref="settings-confirm"]');
    this._rangeEl = this._root.querySelector('[data-ref="settings-time-control"]');
    this._rangeValueEl = this._root.querySelector('[data-ref="settings-time-value"]');
    this._colorInputs = [...this._root.querySelectorAll('[data-ref="settings-color-option"]')];
  }

  _bind() {
    const sig = { signal: this._ac.signal };
    this._cancelBtn.addEventListener('click', () => this.close(), sig);
    this._confirmBtn.addEventListener('click', () => this._onConfirm(), sig);
    this._rangeEl.addEventListener('input', () => this._syncRangeLabel(), sig);
    this._root.addEventListener('click', (event) => { if (event.target === this._root) this.close(); }, sig);
    this._root.addEventListener('keydown', (event) => this._onKeydown(event), sig);
  }

  _syncRangeLabel() {
    this._rangeValueEl.textContent = this._rangeEl.value;
  }

  _onKeydown(event) {
    if (event.key === 'Escape') { this.close(); return; }
    if (event.key !== 'Tab') return;
    const focusable = this._dialogEl.querySelectorAll('button, input, [href]');
    if (focusable.length === 0) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (event.shiftKey && document.activeElement === first) {
      event.preventDefault();
      last.focus();
    } else if (!event.shiftKey && document.activeElement === last) {
      event.preventDefault();
      first.focus();
    }
  }

  open() {
    this._lastFocused = document.activeElement;
    this._root.hidden = false;
    this._confirmBtn.focus();
  }

  close() {
    this._root.hidden = true;
    if (this._lastFocused) this._lastFocused.focus();
  }

  _onConfirm() {
    const checked = this._colorInputs.find((input) => input.checked);
    const color = checked ? checked.value : 'white';
    const timeControl = Number(this._rangeEl.value);
    document.dispatchEvent(new CustomEvent('settings:game-started', { detail: { timeControl, color } }));
    this.close();
  }

  destroy() {
    this._ac.abort();
  }
}

class ChessPageController {
  constructor(root) {
    this._root = typeof root === 'string' ? document.querySelector(root) : root;
    if (!this._root) return;
    this._ac = new AbortController();

    this._headerNav = new HeaderNavController(this._root.querySelector('.header-nav-container'));
    this._playerCards = [...this._root.querySelectorAll('.player-card-container')].map((el) => new PlayerCardController(el));
    this._clocks = [...this._root.querySelectorAll('.clock-container')].map((el) => new ClockController(el));
    this._board = new BoardController(this._root.querySelector('.board-container'));
    this._moveInput = new MoveInputController(this._root.querySelector('.move-input-container'));
    this._moves = new MovesController(this._root.querySelector('.moves-container'));
    this._settingsModal = new SettingsModalController(this._root.querySelector('.settings-modal-container'));
    this._newGameTrigger = this._root.querySelector('[data-ref="new-game-trigger"]');

    this._bind();
    this._syncActiveTurn('w');
  }

  _bind() {
    const sig = { signal: this._ac.signal };
    document.addEventListener('board:move-made', (event) => this._onMoveMade(event), sig);
    document.addEventListener('moveinput:submitted', (event) => this._board.applyMove(event.detail.notation), sig);
    document.addEventListener('clock:expired', (event) => this._onClockExpired(event), sig);
    document.addEventListener('settings:game-started', (event) => this._onGameStarted(event), sig);
    if (this._newGameTrigger) this._newGameTrigger.addEventListener('click', () => this._settingsModal.open(), sig);
  }

  _onMoveMade(event) {
    const nextTurn = event.detail.color === 'w' ? 'b' : 'w';
    this._syncActiveTurn(nextTurn);
  }

  _syncActiveTurn(turnColor) {
    this._playerCards.forEach((card) => card.setActiveTurn(card.color === turnColor));
    this._clocks.forEach((clock) => {
      if (clock.color === turnColor) clock.start();
      else clock.stop();
    });
  }

  _onClockExpired() {
    this._clocks.forEach((clock) => clock.stop());
  }

  _onGameStarted(event) {
    this._clocks.forEach((clock) => clock.reset(event.detail.timeControl));
    this._moves.reset();
    this._board.reset();
    this._syncActiveTurn('w');
  }

  destroy() {
    this._headerNav.destroy();
    this._playerCards.forEach((card) => card.destroy());
    this._clocks.forEach((clock) => clock.destroy());
    this._board.destroy();
    this._moveInput.destroy();
    this._moves.destroy();
    this._settingsModal.destroy();
    this._ac.abort();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  window.chessPage = new ChessPageController('.chess-page');
});

</script>
